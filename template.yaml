AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Monolith-esque API.

Resources:
  MonolithAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
  RunSimulationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 120
      MemorySize: 256
      PackageType: Image
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MonolithAPI
            Path: /simulate
            Method: post
    Metadata:
      DockerTag: run-sim
      DockerContext: ./backend
      Dockerfile: Dockerfile.run-sim
