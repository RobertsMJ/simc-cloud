AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Monolith-esque API.

Parameters:
  StageName:
    Type: String
    Default: dev
    Description: Environment stage (e.g., dev, test, prod)
  ResultsQueueName:
    Type: String
    Default: sim-results
  LogLevel:
    Type: String
    Default: debug
    AllowedValues:
      - debug
      - info
      - warn
      - error
    Description: Log level for Lambda functions
  UseLocal:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Whether to use local resources (e.g., for testing with ElasticMQ)

Globals:
  Function:
    Environment:
      Variables:
        LOG_LEVEL: !Ref LogLevel
        USE_LOCAL: !Ref UseLocal

Resources:
  MonolithAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
  SimulationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${StageName}-sims
      MessageRetentionPeriod: 300
      VisibilityTimeout: 60
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
  SimResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${StageName}-sim-results
      MessageRetentionPeriod: 300
      VisibilityTimeout: 60
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
  SimTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${StageName}-sims
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
  CreateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      MemorySize: 256
      PackageType: Image
      Environment:
        Variables:
          RESULTS_QUEUE_URL: !GetAtt SimResultsQueue.QueueUrl
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MonolithAPI
            Path: /simulate
            Method: post
    Metadata:
      DockerTag: create-job
      DockerContext: ./backend
      Dockerfile: cmd/create-job/Dockerfile
  SimResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      MemorySize: 256
      PackageType: Image
      Environment:
        Variables:
          SIM_TABLE_NAME: !Ref SimTable
      Policies:
        - SQSPollerPolicy:
            QueueName: !Ref SimResultsQueue
        - DynamoDBCrudPolicy:
            TableName: !Ref SimTable
      Events:
        SQS:
          Type: SQS
          Properties:
            Queue: !GetAtt SimResultsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      DockerContext: ./backend
      Dockerfile: cmd/result-writer/Dockerfile
  RunSimulationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 1024
      PackageType: Image
      Environment:
        Variables:
          RESULTS_QUEUE_URL: !GetAtt SimResultsQueue.QueueUrl
      Policies:
        - SQSPollerPolicy:
            QueueName: !Ref SimulationQueue
        - SQSSendMessagePolicy:
            QueueName: !Ref SimResultsQueue
      Events:
        SQS:
          Type: SQS
          Properties:
            Queue: !GetAtt SimulationQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      DockerTag: run-sim
      DockerContext: ./backend
      Dockerfile: cmd/run-sim/Dockerfile
